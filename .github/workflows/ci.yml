name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: none

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show pip version
        run: python -m pip --version

      - name: Guard workflow supply-chain invariants
        run: python scripts/check_workflows.py

      - name: Install hash-locked dependencies
        run: |
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install --no-deps -e .

      - name: Pre-commit (lint + format + hygiene)
        env:
          SKIP: no-commit-to-branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM_REF="${{ github.event.pull_request.base.sha }}"
            TO_REF="${{ github.event.pull_request.head.sha }}"
          else
            FROM_REF="${{ github.event.before }}"
            TO_REF="${{ github.sha }}"
          fi
          # Some event refs may not exist in shallow/partial clones.
          # If either commit is unavailable, fall back to all-files mode.
          if ! git cat-file -e "${FROM_REF}^{commit}" 2>/dev/null || ! git cat-file -e "${TO_REF}^{commit}" 2>/dev/null; then
            echo "Pre-commit refs unavailable in checkout (from=$FROM_REF to=$TO_REF); running all-files."
            pre-commit run --show-diff-on-failure --all-files
            exit $?
          fi
          if echo "$FROM_REF" | grep -Eq '^0+$'; then
            echo "Running pre-commit on all files (no valid base ref)"
            pre-commit run --show-diff-on-failure --all-files
          else
            echo "Running pre-commit from $FROM_REF to $TO_REF"
            pre-commit run --show-diff-on-failure --from-ref "$FROM_REF" --to-ref "$TO_REF"
          fi

      - name: Guard Capability Matrix Updated
        if: github.event_name == 'pull_request'
        env:
          GUARD_CAP_MATRIX_BYPASS_TEXT: ${{ github.event.pull_request.body || '' }}
        run: |
          FROM_REF="${{ github.event.pull_request.base.sha }}"
          TO_REF="${{ github.event.pull_request.head.sha }}"
          bash scripts/guard-capability-matrix.sh "$FROM_REF" "$TO_REF"

      - name: Guard Tier Escalation Invariants
        run: |
          pytest -v \
            tests/test_action_dispatcher.py::TestCapabilityTierGuard \
            tests/test_soundness_verification.py::test_tier_c_dispatch_upgrade \
            tests/test_soundness_verification.py::test_dispatcher_never_downgrades_tier

      - name: Guard Skill Capability Invariants
        run: |
          pytest -v \
            tests/test_skill_loader.py::TestValidation::test_missing_defaults_mapping_for_trigger_raises \
            tests/test_skill_loader.py::TestValidation::test_extra_defaults_key_without_trigger_raises

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=ori \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not hardware"

      - name: Audit pinned Python dependencies
        run: |
          python -m pip_audit -r requirements.txt
          python -m pip_audit -r requirements-dev.txt

      - name: Generate runtime SBOM
        if: matrix.python-version == '3.12'
        run: |
          python -m cyclonedx_py requirements requirements.txt \
            --pyproject pyproject.toml \
            --output-reproducible \
            --of JSON \
            -o sbom-runtime.json

      - name: Upload runtime SBOM
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-runtime
          path: sbom-runtime.json
          if-no-files-found: error

      - name: Validate bundled skills load cleanly
        run: |
          python -c "
          import asyncio, sys
          from ori.skills.loader import SkillLoader
          import pathlib

          skills_dir = pathlib.Path('skills')
          loader = SkillLoader()
          failed = []

          for skill_dir in sorted(skills_dir.iterdir()):
              if not skill_dir.is_dir():
                  continue
              try:
                  skill = loader.load_one(skill_dir)
                  print(f'  ✅ {skill.name} v{skill.version} — {len(skill.triggers)} triggers')
              except Exception as exc:
                  print(f'  ❌ {skill_dir.name}: {exc}')
                  failed.append(skill_dir.name)

          if failed:
              print(f'Failed to load: {failed}')
              sys.exit(1)
          print('All bundled skills loaded cleanly.')
          "

      - name: Upload coverage report
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
