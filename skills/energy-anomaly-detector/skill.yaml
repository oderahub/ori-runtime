name: energy-anomaly-detector
version: 0.1.0
author: wasiubakare
license: Apache-2.0
signature: ed25519:PENDING

sensors_required:
  - type: current_clamp
    protocol: i2c
  - type: ads1115_current
    protocol: i2c
  - type: current
    protocol: serial

triggers:
  - name: anomalous_draw
    condition: "value > 8.0"
    cooldown_seconds: 300
    escalate_to: local_slm
    action_tier: A

  - name: dangerous_overcurrent
    condition: "value > 20.0"
    bypass_llm: true
    action_tier: D
    cooldown_seconds: 0

actions:
  available:
    - name: alert_whatsapp
      tier: A
    - name: log_to_dashboard
      tier: A
  defaults:
    anomalous_draw: [alert_whatsapp, log_to_dashboard]
    dangerous_overcurrent: [alert_whatsapp, log_to_dashboard]
